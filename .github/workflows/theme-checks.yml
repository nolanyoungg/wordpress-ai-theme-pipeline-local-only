name: Theme Checks

on:
  pull_request:
    paths:
      - "preview/**"
      - "wp-content/themes/**"
      - ".github/workflows/theme-checks.yml"
  push:
    paths:
      - "preview/**"
      - "wp-content/themes/**"
      - ".github/workflows/theme-checks.yml"

permissions:
  contents: read

jobs:
  validate-theme:
    name: Validate theme and preview files
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"

      - name: Validate WordPress theme files
        shell: bash
        run: |
          set -e

          THEME_DIR=""
          THEME_VERSION=0

          for CANDIDATE in wp-content/themes/nolan-showcase-theme wp-content/themes/nolan-showcase-theme-x*; do
            [ -d "$CANDIDATE" ] || continue

            NAME="$(basename "$CANDIDATE")"
            if [ "$NAME" = "nolan-showcase-theme" ]; then
              VERSION=1
            else
              VERSION="${NAME##*-x}"
            fi

            if [ "$VERSION" -gt "$THEME_VERSION" ]; then
              THEME_DIR="$CANDIDATE"
              THEME_VERSION="$VERSION"
            fi
          done

          if [ -z "$THEME_DIR" ]; then
            echo "::error::No numbered Nolan Showcase theme folder found."
            exit 1
          fi

          PREVIEW_DIR="preview"
          THEME_ZIP="${THEME_DIR}.zip"

          REQUIRED_THEME_FILES=(
            "$THEME_DIR/style.css"
            "$THEME_DIR/functions.php"
            "$THEME_DIR/index.php"
            "$THEME_DIR/header.php"
            "$THEME_DIR/footer.php"
            "$THEME_DIR/front-page.php"
            "$THEME_DIR/page.php"
            "$THEME_DIR/single.php"
            "$THEME_DIR/archive.php"
            "$THEME_DIR/404.php"
            "$THEME_DIR/assets/css/theme.css"
            "$THEME_DIR/assets/js/theme.js"
            "$THEME_DIR/README.md"
          )

          REQUIRED_PREVIEW_FILES=(
            "$PREVIEW_DIR/index.html"
            "$PREVIEW_DIR/assets/css/preview.css"
            "$PREVIEW_DIR/assets/js/preview.js"
          )

          for REQUIRED_FILE in "${REQUIRED_THEME_FILES[@]}"; do
            [ -f "$REQUIRED_FILE" ] || { echo "::error::Missing required theme file: $REQUIRED_FILE"; exit 1; }
          done

          [ -f "$THEME_ZIP" ] || { echo "::error::Missing theme zip archive: $THEME_ZIP"; exit 1; }

          for REQUIRED_FILE in "${REQUIRED_PREVIEW_FILES[@]}"; do
            [ -f "$REQUIRED_FILE" ] || { echo "::error::Missing required preview file: $REQUIRED_FILE"; exit 1; }
          done

      - name: Check theme header
        shell: bash
        run: |
          THEME_DIR=""
          THEME_VERSION=0

          for CANDIDATE in wp-content/themes/nolan-showcase-theme wp-content/themes/nolan-showcase-theme-x*; do
            [ -f "$CANDIDATE/style.css" ] || continue

            NAME="$(basename "$CANDIDATE")"
            if [ "$NAME" = "nolan-showcase-theme" ]; then
              VERSION=1
            else
              VERSION="${NAME##*-x}"
            fi

            if [ "$VERSION" -gt "$THEME_VERSION" ]; then
              THEME_DIR="$CANDIDATE"
              THEME_VERSION="$VERSION"
            fi
          done

          grep -q "Theme Name:" "$THEME_DIR/style.css"

      - name: Lint PHP files
        shell: bash
        run: |
          THEME_DIR=""
          THEME_VERSION=0

          for CANDIDATE in wp-content/themes/nolan-showcase-theme wp-content/themes/nolan-showcase-theme-x*; do
            [ -d "$CANDIDATE" ] || continue

            NAME="$(basename "$CANDIDATE")"
            if [ "$NAME" = "nolan-showcase-theme" ]; then
              VERSION=1
            else
              VERSION="${NAME##*-x}"
            fi

            if [ "$VERSION" -gt "$THEME_VERSION" ]; then
              THEME_DIR="$CANDIDATE"
              THEME_VERSION="$VERSION"
            fi
          done

          find "$THEME_DIR" -name "*.php" -type f -print0 \
            | xargs -0 -n 1 php -l

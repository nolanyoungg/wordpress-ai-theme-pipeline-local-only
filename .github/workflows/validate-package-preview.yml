name: Validate, Package, and Publish Previews

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: validate-package-preview-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-package:
    name: Validate themes and build zips
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"

      - name: Detect themes
        id: detect
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob

          themes=(wp-content/themes/nolan-showcase-theme-x*)
          if [ "${#themes[@]}" -eq 0 ]; then
            echo "::error::No theme folders found matching wp-content/themes/nolan-showcase-theme-x*"
            exit 1
          fi

          printf '%s\n' "${themes[@]}" | sort > .themes.txt
          echo "count=$(wc -l < .themes.txt | tr -d ' ')" >> "$GITHUB_OUTPUT"

      - name: Determine changed themes
        id: changes
        shell: bash
        run: |
          set -euo pipefail

          base_sha=""
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base_sha="${{ github.event.pull_request.base.sha }}"
          elif [ "${{ github.event_name }}" = "push" ]; then
            base_sha="${{ github.event.before }}"
          fi

          if [ -z "$base_sha" ] || [ "$base_sha" = "0000000000000000000000000000000000000000" ]; then
            if git rev-parse --verify HEAD^ >/dev/null 2>&1; then
              base_sha="$(git rev-parse HEAD^)"
            else
              base_sha="$(git rev-parse HEAD)"
            fi
          fi

          echo "Base SHA: $base_sha"
          echo "Head SHA: $GITHUB_SHA"

          changed_paths="$(git diff --name-only "$base_sha" "$GITHUB_SHA" || true)"

          # Record which theme versions changed (source and/or preview). We enforce zip freshness
          # for theme source changes, and require zips to exist for any detected theme folder.
          printf '%s\n' "$changed_paths" > .changed-paths.txt

          awk -F/ '/^wp-content\/themes\/nolan-showcase-theme-x[0-9]+\// {print $3}' .changed-paths.txt | sort -u > .changed-themes.txt
          echo "changed_count=$(wc -l < .changed-themes.txt | tr -d ' ')" >> "$GITHUB_OUTPUT"

      - name: Validate theme files and PHP syntax
        shell: bash
        run: |
          set -euo pipefail

          required_files=(
            "style.css"
            "functions.php"
            "index.php"
            "header.php"
            "footer.php"
            "front-page.php"
            "page.php"
            "single.php"
            "archive.php"
            "search.php"
            "404.php"
            "comments.php"
            "template-parts/content.php"
            "template-parts/content-page.php"
            "template-parts/content-none.php"
            "assets/css/theme.css"
            "assets/js/theme.js"
            "README.md"
          )

          while IFS= read -r theme_dir; do
            [ -d "$theme_dir" ] || continue
            theme_slug="$(basename "$theme_dir")"
            echo "==> Validating $theme_slug"

            for rel in "${required_files[@]}"; do
              if [ ! -f "$theme_dir/$rel" ]; then
                echo "::error::Missing required file for $theme_slug: $theme_dir/$rel"
                exit 1
              fi
            done

            if ! grep -q "^Theme Name:" "$theme_dir/style.css"; then
              echo "::error::Missing 'Theme Name:' header in $theme_dir/style.css"
              exit 1
            fi

            # Catch "styles not loading" issues:
            # - stylesheet must be non-trivial
            # - functions.php must enqueue the expected paths
            css_bytes="$(wc -c < "$theme_dir/assets/css/theme.css" | tr -d ' ')"
            if [ "$css_bytes" -lt 800 ]; then
              echo "::error::Theme stylesheet too small for $theme_slug ($css_bytes bytes): $theme_dir/assets/css/theme.css"
              exit 1
            fi

            js_bytes="$(wc -c < "$theme_dir/assets/js/theme.js" | tr -d ' ')"
            if [ "$js_bytes" -lt 120 ]; then
              echo "::error::Theme script too small for $theme_slug ($js_bytes bytes): $theme_dir/assets/js/theme.js"
              exit 1
            fi

            # Themes may enqueue via included files; validate within the theme directory.
            grep -R -q "assets/css/theme.css" "$theme_dir" || { echo "::error::Theme does not reference assets/css/theme.css for $theme_slug"; exit 1; }
            grep -R -q "wp_enqueue_style" "$theme_dir" || { echo "::error::Theme does not call wp_enqueue_style for $theme_slug"; exit 1; }
            grep -R -q "assets/js/theme.js" "$theme_dir" || { echo "::error::Theme does not reference assets/js/theme.js for $theme_slug"; exit 1; }
            grep -R -q "wp_enqueue_script" "$theme_dir" || { echo "::error::Theme does not call wp_enqueue_script for $theme_slug"; exit 1; }

            find "$theme_dir" -name "*.php" -type f -print0 | xargs -0 -n 1 php -l
          done < .themes.txt

      - name: Validate docs preview folders
        shell: bash
        run: |
          set -euo pipefail

          [ -f "docs/index.html" ] || { echo "::error::Missing docs/index.html"; exit 1; }

          while IFS= read -r theme_dir; do
            [ -d "$theme_dir" ] || continue
            theme_slug="$(basename "$theme_dir")"
            preview_dir="docs/themes/$theme_slug"

            for f in \
              "$preview_dir/index.html" \
              "$preview_dir/assets/css/preview.css" \
              "$preview_dir/assets/js/preview.js"
            do
              [ -f "$f" ] || { echo "::error::Missing preview file for $theme_slug: $f"; exit 1; }
            done

            if ! grep -q "assets/css/preview.css" "$preview_dir/index.html"; then
              echo "::error::Preview HTML does not link preview.css for $theme_slug: $preview_dir/index.html"
              exit 1
            fi

            if ! grep -q "assets/js/preview.js" "$preview_dir/index.html"; then
              echo "::error::Preview HTML does not load preview.js for $theme_slug: $preview_dir/index.html"
              exit 1
            fi

            preview_css_bytes="$(wc -c < "$preview_dir/assets/css/preview.css" | tr -d ' ')"
            if [ "$preview_css_bytes" -lt 800 ]; then
              echo "::error::Preview stylesheet too small for $theme_slug ($preview_css_bytes bytes): $preview_dir/assets/css/preview.css"
              exit 1
            fi
          done < .themes.txt

      - name: Verify committed zips exist
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r theme_dir; do
            [ -d "$theme_dir" ] || continue
            theme_slug="$(basename "$theme_dir")"
            if [ ! -f "zippedTheme/${theme_slug}.zip" ]; then
              echo "::error::Missing committed zip for $theme_slug at zippedTheme/${theme_slug}.zip"
              echo "::error::Regenerate and commit the zip for this theme version."
              exit 1
            fi
          done < .themes.txt

      - name: Build theme zip files (fresh)
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p tmpZips
          rm -f tmpZips/*.zip

          while IFS= read -r theme_dir; do
            [ -d "$theme_dir" ] || continue
            theme_slug="$(basename "$theme_dir")"
            echo "==> Packaging $theme_slug.zip"
            (
              cd wp-content/themes
              zip -qr "../../tmpZips/${theme_slug}.zip" "$theme_slug"
            )
          done < .themes.txt

      - name: Verify committed zips match source for changed themes
        shell: bash
        run: |
          set -euo pipefail

          if [ ! -s .changed-themes.txt ]; then
            echo "No theme source changes detected; skipping committed zip freshness check."
            exit 0
          fi

          # Compare by extracted file content hashes (zip timestamps/metadata are not stable).
          while IFS= read -r theme_slug; do
            [ -n "$theme_slug" ] || continue
            committed_zip="zippedTheme/${theme_slug}.zip"
            built_zip="tmpZips/${theme_slug}.zip"

            [ -f "$committed_zip" ] || { echo "::error::Missing committed zip: $committed_zip"; exit 1; }
            [ -f "$built_zip" ] || { echo "::error::Missing freshly built zip: $built_zip"; exit 1; }

            rm -rf "_zipdiff/$theme_slug"
            mkdir -p "_zipdiff/$theme_slug/committed" "_zipdiff/$theme_slug/built"
            unzip -q "$committed_zip" -d "_zipdiff/$theme_slug/committed"
            unzip -q "$built_zip" -d "_zipdiff/$theme_slug/built"

            (
              cd "_zipdiff/$theme_slug/committed"
              find . -type f -print0 | sort -z | xargs -0 sha256sum
            ) > "_zipdiff/$theme_slug/committed.sha"

            (
              cd "_zipdiff/$theme_slug/built"
              find . -type f -print0 | sort -z | xargs -0 sha256sum
            ) > "_zipdiff/$theme_slug/built.sha"

            if ! diff -u "_zipdiff/$theme_slug/committed.sha" "_zipdiff/$theme_slug/built.sha" >/dev/null; then
              echo "::error::Committed zip is stale for $theme_slug: $committed_zip"
              echo "::error::Rebuild the zip from source and commit the updated zippedTheme/${theme_slug}.zip"
              echo "::error::Diff (first 200 lines):"
              diff -u "_zipdiff/$theme_slug/committed.sha" "_zipdiff/$theme_slug/built.sha" | sed -n '1,200p'
              exit 1
            fi
          done < .changed-themes.txt

      - name: Verify zip contents
        shell: bash
        run: |
          set -euo pipefail

          while IFS= read -r theme_dir; do
            [ -d "$theme_dir" ] || continue
            theme_slug="$(basename "$theme_dir")"
            zip_path="tmpZips/${theme_slug}.zip"

            [ -f "$zip_path" ] || { echo "::error::Missing zip: $zip_path"; exit 1; }

            unzip -l "$zip_path" | grep -q "${theme_slug}/style.css" || { echo "::error::Zip missing style.css for $theme_slug"; exit 1; }
            unzip -l "$zip_path" | grep -q "${theme_slug}/assets/css/theme.css" || { echo "::error::Zip missing theme.css for $theme_slug"; exit 1; }
            unzip -l "$zip_path" | grep -q "${theme_slug}/assets/js/theme.js" || { echo "::error::Zip missing theme.js for $theme_slug"; exit 1; }
            unzip -l "$zip_path" | grep -q "${theme_slug}/functions.php" || { echo "::error::Zip missing functions.php for $theme_slug"; exit 1; }
            unzip -l "$zip_path" | grep -q "${theme_slug}/front-page.php" || { echo "::error::Zip missing front-page.php for $theme_slug"; exit 1; }
            unzip -l "$zip_path" | grep -q "${theme_slug}/template-parts/content.php" || { echo "::error::Zip missing template-parts/content.php for $theme_slug"; exit 1; }
          done < .themes.txt

      - name: Upload zip artifacts
        uses: actions/upload-artifact@v4
        with:
          name: theme-zips
          path: tmpZips/*.zip
          if-no-files-found: error

  pages:
    name: Publish GitHub Pages
    runs-on: ubuntu-latest
    needs: validate-package
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

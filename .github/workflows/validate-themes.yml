name: Validate Themes

on:
  pull_request:
    branches: ["main"]

  push:
    branches: ["main"]

  workflow_dispatch: {}

jobs:
  validate-themes:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install npm dependencies
        run: npm ci

      - name: Validate themes
        shell: pwsh
        run: ./scripts/validate-themes.ps1

      - name: Upload generated ZIP artifacts
        uses: actions/upload-artifact@v4
        with:
          name: theme-zips
          path: zippedTheme/*.zip
          if-no-files-found: error
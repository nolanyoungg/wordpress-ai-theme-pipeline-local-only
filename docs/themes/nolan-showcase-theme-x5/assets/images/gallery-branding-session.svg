    <path d="M250 640h120" stroke="#f7f1e7" stroke-opacity="0.16" stroke-width="4" stroke-linecap="round"/>
  </g>

  <rect x="96" y="92" width="1008" height="716" rx="40" fill="none" stroke="#f7f1e7" stroke-opacity="0.10"/>
  <rect width="1200" height="900" filter="url(#grain)" opacity="0.65"/>
  <text x="118" y="784" fill="#f7f1e7" fill-opacity="0.42" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace" font-size="18" letter-spacing="3">BRANDING • SESSION</text>
